<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0077ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9a1f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#grad)" rx="80"/>
  
  <!-- Grid of mini apps (3x3) -->
  <g fill="#ffffff" opacity="0.9">
    <!-- Row 1 -->
    <rect x="120" y="120" width="80" height="80" rx="12"/>
    <rect x="216" y="120" width="80" height="80" rx="12"/>
    <rect x="312" y="120" width="80" height="80" rx="12"/>
    
    <!-- Row 2 -->
    <rect x="120" y="216" width="80" height="80" rx="12"/>
    <rect x="216" y="216" width="80" height="80" rx="12"/>
    <rect x="312" y="216" width="80" height="80" rx="12"/>
    
    <!-- Row 3 -->
    <rect x="120" y="312" width="80" height="80" rx="12"/>
    <rect x="216" y="312" width="80" height="80" rx="12"/>
    <rect x="312" y="312" width="80" height="80" rx="12"/>
  </g>
</svg>
