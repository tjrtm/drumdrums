<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="DrumDrums Portal — discover, preview, and download practical mini apps." />
  <title>DrumDrums Portal</title>
  <link rel="manifest" href="./manifest.json" />
  <style>
    :root {
      --bg: #060b1a;
      --panel: #0f172a;
      --soft: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent2: #22d3ee;
      --ok: #34d399;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #1e3a8a 0%, #060b1a 40%), var(--bg);
      min-height: 100vh;
    }
    .container { width: min(1120px, 92vw); margin: 0 auto; }
    header { padding: 2rem 0 1rem; }
    .hero {
      background: linear-gradient(130deg, rgba(56,189,248,.2), rgba(34,211,238,.1));
      border: 1px solid rgba(148,163,184,.22);
      border-radius: calc(var(--radius) + 4px);
      padding: clamp(1rem, 4vw, 2rem);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: center;
    }
    .hero h1 { margin: 0 0 .5rem; font-size: clamp(1.5rem, 4vw, 2.6rem); }
    .hero p { margin: 0; color: var(--muted); max-width: 65ch; }
    .row { display: flex; gap: .75rem; flex-wrap: wrap; margin-top: 1rem; }
    .btn {
      border: none;
      border-radius: 999px;
      padding: .7rem 1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
    }
    .btn.primary { background: linear-gradient(120deg, var(--accent), var(--accent2)); color: #00131f; }
    .btn.ghost { background: #0b1220; color: var(--text); border: 1px solid rgba(148,163,184,.35); }
    .stats {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: .5rem;
      color: var(--muted);
      font-size: .92rem;
    }
    main { padding: 1rem 0 3rem; }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: .75rem;
      margin-bottom: 1rem;
    }
    input, select {
      width: 100%;
      background: #0b1220;
      color: var(--text);
      border: 1px solid rgba(148,163,184,.25);
      border-radius: 10px;
      padding: .72rem .8rem;
      font-size: .95rem;
    }
    .grid {
      display: grid;
      gap: .9rem;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    }
    article {
      background: rgba(15,23,42,.9);
      border: 1px solid rgba(148,163,184,.22);
      border-radius: var(--radius);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: .8rem;
    }
    .badge {
      display: inline-block;
      border: 1px solid rgba(148,163,184,.3);
      color: var(--muted);
      padding: .25rem .55rem;
      border-radius: 999px;
      font-size: .75rem;
      margin-right: .25rem;
    }
    article h3 { margin: 0; font-size: 1.04rem; }
    article p { margin: 0; color: var(--muted); font-size: .94rem; line-height: 1.45; }
    .actions { margin-top: auto; display: flex; gap: .5rem; flex-wrap: wrap; }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(2,6,23,.8);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 20;
    }
    .modal.open { display: flex; }
    .modal-panel {
      width: min(1080px, 100%);
      height: min(760px, 90vh);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(148,163,184,.25);
      background: #020617;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f172a;
      padding: .7rem .8rem;
    }
    iframe { width: 100%; height: 100%; border: 0; background: #fff; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    @media (max-width: 780px) {
      .hero { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="container">
    <section class="hero">
      <div>
        <h1>🥁 DrumDrums Portal</h1>
        <p>Find useful mini apps fast, launch a live preview instantly, and download apps to your device for offline use.</p>
        <div class="row">
          <button id="installBtn" class="btn primary">Install DrumDrums</button>
          <a href="#apps" class="btn ghost">Browse Apps</a>
        </div>
      </div>
      <ul class="stats" aria-label="Portal status">
        <li><strong id="appCount">0</strong> apps available</li>
        <li><strong>Instant preview</strong> with in-portal runner</li>
        <li><strong>Offline download</strong> as standalone HTML</li>
      </ul>
    </section>
  </header>

  <main class="container" id="apps">
    <section class="toolbar" aria-label="App filters">
      <label>
        <span class="sr-only">Search apps</span>
        <input id="search" type="search" placeholder="Search apps (timer, health, productivity...)" />
      </label>
      <label>
        <span class="sr-only">Filter by category</span>
        <select id="category"></select>
      </label>
    </section>

    <section id="grid" class="grid" aria-live="polite"></section>
  </main>

  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-panel">
      <div class="modal-head">
        <strong id="modalTitle">Preview</strong>
        <button id="closeModal" class="btn ghost">Close</button>
      </div>
      <iframe id="previewFrame" title="Mini app preview"></iframe>
    </div>
  </div>

  <script>
    const apps = [
      { title: 'Focus Timer', path: './focus-timer/', category: 'Productivity', description: 'Start focused sessions quickly with a clean timer UI.' },
      { title: 'Meeting Cost Calculator', path: './meeting-cost-calculator/', category: 'Work', description: 'Estimate the real-time cost of meetings and improve planning.' },
      { title: 'Smart Grocery List', path: './smart-grocery-list/', category: 'Life', description: 'Quickly build and track grocery items in one simple flow.' },
      { title: 'Unit Converter', path: './unit-converter/', category: 'Utilities', description: 'Convert common units for cooking, travel, and day-to-day work.' },
      { title: 'QR Code Generator', path: './qr-code-generator/', category: 'Utilities', description: 'Generate QR codes for URLs, text, contacts, and more.' },
      { title: 'Quick Mood Tracker', path: './quick-mood-tracker/', category: 'Health', description: 'Log mood and energy in seconds and review your trends.' },
      { title: 'Pomodoro', path: './pomodoro/', category: 'Productivity', description: 'Use Pomodoro intervals to sustain deep work sessions.' },
      { title: 'Tip Calculator', path: './tip-calc/', category: 'Utilities', description: 'Split bills and calculate tips accurately in seconds.' },
      { title: 'Timezone Converter', path: './timezone-converter/', category: 'Work', description: 'Convert time between common city zones for team scheduling.' },
      { title: 'Breath Timer', path: './breath-timer/', category: 'Health', description: 'Follow guided breath patterns for stress reset and focus.' },
      { title: 'JSON Formatter', path: './json-formatter/', category: 'Developer', description: 'Format and validate JSON quickly when debugging payloads.' },
      { title: 'Password Generator', path: './password-gen/', category: 'Security', description: 'Create strong random passwords with one tap.' }
    ];

    const grid = document.getElementById('grid');
    const search = document.getElementById('search');
    const category = document.getElementById('category');
    const appCount = document.getElementById('appCount');
    const modal = document.getElementById('modal');
    const frame = document.getElementById('previewFrame');
    const modalTitle = document.getElementById('modalTitle');
    const closeModal = document.getElementById('closeModal');

    const categories = ['All', ...new Set(apps.map(app => app.category))];
    category.innerHTML = categories.map(name => `<option value="${name}">${name}</option>`).join('');
    appCount.textContent = String(apps.length);

    function downloadApp(app) {
      fetch(app.path + 'index.html')
        .then((res) => {
          if (!res.ok) throw new Error('Unable to fetch app HTML');
          return res.blob();
        })
        .then((blob) => {
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          const slug = app.title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
          link.href = url;
          link.download = `${slug}.html`;
          document.body.appendChild(link);
          link.click();
          link.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1200);
        })
        .catch(() => alert('Download failed. Please open the app and use browser Save Page as fallback.'));
    }

    function openPreview(app) {
      modalTitle.textContent = `${app.title} — Live Preview`;
      frame.src = app.path;
      modal.classList.add('open');
      closeModal.focus();
    }

    function render() {
      const term = search.value.trim().toLowerCase();
      const selected = category.value;

      const filtered = apps.filter((app) => {
        const matchesTerm = !term || `${app.title} ${app.description} ${app.category}`.toLowerCase().includes(term);
        const matchesCategory = selected === 'All' || app.category === selected;
        return matchesTerm && matchesCategory;
      });

      if (!filtered.length) {
        grid.innerHTML = '<article><h3>No apps found</h3><p>Try a different search term or category.</p></article>';
        return;
      }

      grid.innerHTML = '';
      for (const app of filtered) {
        const card = document.createElement('article');
        card.innerHTML = `
          <div>
            <span class="badge">${app.category}</span>
          </div>
          <h3>${app.title}</h3>
          <p>${app.description}</p>
          <div class="actions">
            <button class="btn primary" data-action="try">Try now</button>
            <a class="btn ghost" href="${app.path}" target="_blank" rel="noopener">Open</a>
            <button class="btn ghost" data-action="download">Download</button>
          </div>
        `;

        card.querySelector('[data-action="try"]').addEventListener('click', () => openPreview(app));
        card.querySelector('[data-action="download"]').addEventListener('click', () => downloadApp(app));
        grid.appendChild(card);
      }
    }

    search.addEventListener('input', render);
    category.addEventListener('change', render);
    closeModal.addEventListener('click', () => {
      modal.classList.remove('open');
      frame.src = 'about:blank';
    });
    modal.addEventListener('click', (event) => {
      if (event.target === modal) {
        modal.classList.remove('open');
        frame.src = 'about:blank';
      }
    });

    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');
    installBtn.disabled = true;
    installBtn.textContent = 'Install unavailable';

    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      deferredPrompt = event;
      installBtn.disabled = false;
      installBtn.textContent = 'Install DrumDrums';
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) {
        alert('To install now: open browser menu and choose “Install app” or “Add to Home Screen”.');
        return;
      }
      deferredPrompt.prompt();
      const outcome = await deferredPrompt.userChoice;
      if (outcome.outcome === 'accepted') {
        installBtn.textContent = 'Installed ✓';
      }
      deferredPrompt = null;
    });

    render();
  </script>
</body>
</html>
