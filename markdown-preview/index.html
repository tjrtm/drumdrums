<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DrumDrums — Markdown Previewer</title>
<link rel="stylesheet" href="../shared/theme.css" />
<style>
:root { --bg:#eef2ff; --panel:#fff; --text:#0f172a; --muted:#64748b; --line:rgba(15,23,42,.12); --accent:#4f46e5; }
[data-theme="dark"] { --bg:#0b1020; --panel:#111827; --text:#e5e7eb; --muted:#9ca3af; --line:rgba(255,255,255,.15); --accent:#818cf8; }
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--text);background:linear-gradient(135deg,#6366f1,var(--bg));padding:16px;min-height:100vh}
.container{max-width:1200px;margin:0 auto}
.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
.back{color:white;text-decoration:none;font-weight:700;background:rgba(15,23,42,.28);padding:8px 12px;border-radius:999px}
h1{margin:0;color:#fff}.subtitle{color:#e2e8f0;margin:6px 0 14px}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.panel-head{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line)}
textarea{width:100%;min-height:64vh;border:0;padding:14px;background:transparent;color:var(--text);font:14px/1.5 ui-monospace,monospace;resize:vertical}
.preview{min-height:64vh;max-height:64vh;overflow:auto;padding:14px;line-height:1.6}
.preview pre{background:#0f172a;color:#e2e8f0;padding:12px;border-radius:10px;overflow:auto}
.preview code{background:rgba(99,102,241,.15);padding:2px 5px;border-radius:4px}
.preview blockquote{border-left:3px solid var(--accent);padding-left:10px;color:var(--muted)}
.preview table{border-collapse:collapse;width:100%}.preview td,.preview th{border:1px solid var(--line);padding:6px}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.btn{border:0;padding:9px 12px;border-radius:8px;background:var(--accent);color:#fff;font-weight:700;cursor:pointer}
.toast{position:fixed;right:14px;bottom:14px;background:#16a34a;color:#fff;padding:10px 12px;border-radius:10px;display:none}.toast.show{display:block}
</style>
<script src="../shared/theme.js" defer></script>
<script src="../tmp_marked.min.js" defer></script>
</head>
<body>
  <div class="container">
    <div class="top" data-theme-anchor>
      <a class="back" href="../index.html">← All apps</a>
    </div>
    <h1>📝 Markdown Previewer</h1>
    <p class="subtitle">Live preview as you type. Export to .md or .html without popups.</p>
    <div class="layout">
      <section class="panel">
        <div class="panel-head"><strong>Markdown</strong><button class="btn" id="clearBtn" type="button">Clear</button></div>
        <textarea id="editor" placeholder="# Hello\n\nWrite **markdown** here..."></textarea>
      </section>
      <section class="panel">
        <div class="panel-head"><strong>Preview</strong><button class="btn" id="copyBtn" type="button">Copy HTML</button></div>
        <div class="preview" id="preview"></div>
      </section>
    </div>
    <div class="actions">
      <button class="btn" id="downloadMd" type="button">⬇️ Download .md</button>
      <button class="btn" id="downloadHtml" type="button">⬇️ Download .html</button>
    </div>
  </div>
  <div class="toast" id="toast">Done</div>
<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const toast = document.getElementById('toast');

editor.value = `# Markdown Preview\n\n- Live render\n- Export markdown\n- Export HTML\n`;

function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1800)}
function downloadFile(blob, filename){const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1200)}
function render(){
  if (!window.marked) return;
  preview.innerHTML = window.marked.parse(editor.value, { mangle:false, headerIds:false });
}

editor.addEventListener('input', render);
document.getElementById('clearBtn').addEventListener('click', ()=>{editor.value='';render()});
document.getElementById('copyBtn').addEventListener('click', async ()=>{try{await navigator.clipboard.writeText(preview.innerHTML);showToast('HTML copied');}catch{showToast('Clipboard blocked');}});
document.getElementById('downloadMd').addEventListener('click', ()=>{downloadFile(new Blob([editor.value], {type:'text/markdown'}), 'document.md');showToast('Downloaded document.md')});
document.getElementById('downloadHtml').addEventListener('click', ()=>{
  const html = `<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Markdown Export</title><style>body{font-family:Inter,system-ui,sans-serif;max-width:860px;margin:32px auto;padding:0 16px;line-height:1.6}pre{background:#111827;color:#e5e7eb;padding:12px;border-radius:8px;overflow:auto}code{background:#eef2ff;padding:2px 5px;border-radius:4px}</style></head><body>${preview.innerHTML}</body></html>`;
  downloadFile(new Blob([html], {type:'text/html'}), 'document.html');
  showToast('Downloaded document.html');
});
document.addEventListener('keydown', (e)=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='s'){e.preventDefault();document.getElementById('downloadMd').click();}});
window.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
